services:
  # Web3 Indexer Application
  indexer:
    image: web3-indexer-go:stable
    container_name: ${COMPOSE_PROJECT_NAME}-app
    deploy:
      resources:
        limits:
          memory: 128M
    network_mode: host  # 👈 核心修改：使用 Host 模式，彻底打通 Tailscale 和宿主机端口
    env_file:
      - ../env/.env.demo2
    environment:
      # 覆盖特定配置（优先级高于 env_file）
      - APP_TITLE=${APP_TITLE:-🚀 Web3 Indexer (Demo)}
      - PORT=${PORT:-8082}  # 8082 端口（演示环境）
      - APP_MODE=${APP_MODE:-EPHEMERAL_ANVIL}  # 🔥 显式设置策略模式
      - CHAIN_ID=${CHAIN_ID:-31337}  # 🔥 显式设置链 ID（Anvil = 31337）
      - FORCE_BEAST_ALIGNMENT=${FORCE_BEAST_ALIGNMENT:-true}  # 🔥 冷启动自动对齐链尖
      - CLEAR_CHECKPOINTS_ON_START=${CLEAR_CHECKPOINTS_ON_START:-true}  # 启动时清理 checkpoints
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  # Anvil Service (Only for Demo Mode)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: ${COMPOSE_PROJECT_NAME}-anvil
    profiles: ["demo"]
    network_mode: host # 也可以改为 host
    entrypoint: ["anvil"]
    command: [
      "--host", "0.0.0.0",
      "--port", "8545",
      "--block-time", "1"
    ]
    deploy:
      resources:
        limits:
          memory: 2G
    tmpfs:
      - /home/foundry/.foundry/anvil/tmp:rw,size=100M,noexec,nosuid,nodev
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL Database Service (for Demo mode)
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-db
    profiles: ["demo"]
    network_mode: host
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=W3b3_Idx_Secur3_2026_Sec
      - POSTGRES_DB=${POSTGRES_DB:-web3_demo}
    command: [
      "postgres",
      "-p", "${DB_PORT:-15434}"
    ]
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p ${DB_PORT:-15434}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # PostgreSQL Database Service (for Testnet mode)
  testnet-db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-db
    profiles: ["testnet"]
    network_mode: host
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=W3b3_Idx_Secur3_2026_Sec
      - POSTGRES_DB=${POSTGRES_DB:-web3_sepolia}
    command: [
      "postgres",
      "-p", "${DB_PORT:-15433}"
    ]
    deploy:
      resources:
        limits:
          memory: 128M
    volumes:
      - postgres_testnet_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_demo_data:
    driver: local
  postgres_testnet_data:
    driver: local