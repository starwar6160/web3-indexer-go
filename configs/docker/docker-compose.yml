services:
  # Web3 Indexer Application
  indexer:
    image: web3-indexer-go:stable
    container_name: ${COMPOSE_PROJECT_NAME}-app
    deploy:
      resources:
        limits:
          memory: 128M
    network_mode: host  # 👈 核心修改：使用 Host 模式，彻底打通 Tailscale 和宿主机端口
    env_file:
      - ../env/.env.demo2
    environment:
      # 覆盖特定配置（优先级高于 env_file）
      - APP_TITLE=${APP_TITLE:-🚀 Web3 Indexer (Demo)}
      - PORT=${PORT:-8082}  # 8082 端口（演示环境）
      - FORCE_BEAST_ALIGNMENT=${FORCE_BEAST_ALIGNMENT:-true}  # 🔥 冷启动自动对齐链尖
      - CLEAR_CHECKPOINTS_ON_START=${CLEAR_CHECKPOINTS_ON_START:-true}  # 启动时清理 checkpoints
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8080}/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  # Anvil Service (Only for Demo Mode)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: ${COMPOSE_PROJECT_NAME}-anvil
    profiles: ["demo"]
    network_mode: host # 也可以改为 host
    entrypoint: ["anvil"]
    command: [
      "--host", "0.0.0.0",
      "--port", "8545",
      "--block-time", "1"
    ]
    deploy:
      resources:
        limits:
          memory: 2G
    tmpfs:
      - /home/foundry/.foundry/anvil/tmp:rw,size=100M,noexec,nosuid,nodev
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# 移除独立的 db 网络定义，因为我们现在复用宿主机的基础设施